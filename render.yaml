# Render Blueprint — VenueScout
# Deploy: connect the GitHub repo in Render Dashboard → Blueprints → New Blueprint Instance
databases:
  - name: venuescout-db
    plan: basic-1gb # flexible plan: scale CPU/RAM/storage independently
    postgresMajorVersion: "17"

services:
  - type: web
    name: venuescout-api
    runtime: node
    plan: standard
    rootDir: backend
    buildCommand: npm ci && npm run build
    startCommand: npm run migrate && npm start
    healthCheckPath: /api/v1/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: venuescout-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false # set in dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: S3_ENDPOINT
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: NODE_VERSION
        value: "22"

  - type: web
    name: venuescout-web
    runtime: node
    plan: starter
    rootDir: web
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: venuescout-api
          envVarKey: RENDER_EXTERNAL_URL
      - key: NODE_VERSION
        value: "22"
